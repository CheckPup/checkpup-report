<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Oscar's Health Report — CheckPup</title>
<style>
/* ================================================================
   CHECKPUP V10.1 — Premium Health Report (Fully Self-Contained)
   Zero external dependencies. Redesigned entry screen.
   ================================================================ */
@font-face {
  font-family: 'SF';
  src: local('SF Pro Display'), local('SF Pro Text'), local('.AppleSystemUIFont'),
       local('Segoe UI'), local('Helvetica Neue'), local('Helvetica'), local('Arial');
  font-display: swap;
}
:root{
  --bg:#F7F6F3;--sf:#FFFFFF;
  --bdr:#E5E0D8;--bdr-l:#EFEAE2;
  --t1:#1A1A17;--t2:#5C5C57;--t3:#9C9C96;
  --brand:#C2590A;--brand-h:#A84A08;--brand-l:#FFF5ED;
  --crit:#C62828;--crit-l:#FFEBEE;--crit-bg:#FFF5F5;
  --warn:#D84315;--warn-l:#FFF3E0;
  --caut:#F9A825;--caut-l:#FFFDE7;
  --ok:#2E7D32;--ok-l:#E8F5E9;--ok-bg:#F1F8F2;
  --act:#00695C;--act-d:#004D40;--act-l:#E0F2F1;
  --s1:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --s2:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --s3:0 8px 24px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.06);
  --r:16px;--rm:12px;--rs:8px;
  --fs-xs:10px;--fs-sm:11px;--fs-base:14px;--fs-md:16px;--fs-lg:18px;--fs-xl:20px;--fs-2xl:22px;--fs-3xl:28px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent}
body{font-family:'SF',system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--t1);line-height:1.6;-webkit-font-smoothing:antialiased;max-width:420px;margin:0 auto}

/* Header — dark green, matches screenshot exactly */
.hdr{padding:18px 20px 14px;background:#1B4332;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between}
.logo-txt{display:flex;align-items:center}
.logo-img{height:28px;object-fit:contain;filter:brightness(0) invert(1)}
.hdr-btns{display:flex;gap:8px}
.hdr-btn{font-size:13px;font-weight:600;padding:10px 22px;border-radius:100px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;transition:all .2s;font-family:inherit;-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px)}
.hdr-btn:active{transform:scale(.95);background:rgba(255,255,255,.15)}

/* ======== HERO V10.4 — Green gradient ======== */

/* Dark green gradient banner (flows from header) */
.hero-banner{background:linear-gradient(175deg,#1B4332 0%,#2D6A4F 50%,#40916C 100%);padding:8px 20px 20px;position:relative;overflow:hidden}
.hero-banner::after{content:'';position:absolute;top:-30%;right:-15%;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.06) 0%,transparent 70%)}
.hero-avatar{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-avatar svg{width:40px;height:40px}
.hero-id{display:flex;align-items:center;gap:16px;position:relative;z-index:1;margin-bottom:16px}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:var(--fs-3xl);font-weight:800;letter-spacing:-.5px;line-height:1.2;color:#fff}
.hero-meta{font-size:13px;color:rgba(255,255,255,.6);margin-top:4px;font-weight:500}
.hero-vet{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:rgba(255,255,255,.8);background:rgba(255,255,255,.12);padding:7px 16px;border-radius:100px;border:1px solid rgba(255,255,255,.15);position:relative;z-index:1}

/* Summary card (white, overlaps green banner) */
.hero-card{background:rgba(255,255,255,.12);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:var(--r);margin:12px 16px 0;padding:22px 24px;position:relative;z-index:2;border:1px solid rgba(255,255,255,.18)}
.hero-card-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:14px}
.hero-card-content{flex:1;min-width:0}
.hero-card-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.65);margin-bottom:8px}
.hero-card-title{font-size:var(--fs-2xl);font-weight:800;letter-spacing:-.3px;line-height:1.2;color:#fff}
.hero-card-desc{font-size:13.5px;color:rgba(255,255,255,.8);line-height:1.6;margin-top:8px}
.hero-card-desc em{font-style:normal;color:#fff;font-weight:600}
.hero-card-cta{display:inline-block;padding:10px 22px;border-radius:var(--rm);background:rgba(255,255,255,.95);color:var(--brand);font-size:13.5px;font-weight:700;border:none;cursor:pointer;margin-top:14px;font-family:inherit;transition:transform .15s;letter-spacing:-.1px}
.hero-card-cta:active{transform:scale(.96)}

/* Score ring in card */
.hero-ring-wrap{position:relative;width:72px;height:72px;flex-shrink:0}
.hero-ring-svg{width:72px;height:72px;transform:rotate(-90deg)}
.hero-ring-bg{fill:none;stroke:var(--bdr-l);stroke-width:5}
.hero-ring-fill{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .8s ease}
.hero-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hero-ring-num{font-size:var(--fs-xl);font-weight:800;line-height:1;letter-spacing:-.5px;color:var(--t1)}
.hero-ring-of{font-size:8.5px;color:var(--t3);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* Stat strip inside card */
.hero-strip{display:flex;gap:0;margin-top:16px;padding-top:14px;border-top:1px solid var(--bdr-l)}
.hero-stat{flex:1;text-align:center;padding:4px 0}
.hero-stat:not(:last-child){border-right:1px solid var(--bdr-l)}
.hero-stat-num{font-size:var(--fs-2xl);font-weight:800;line-height:1;margin-bottom:3px}
.hero-stat-label{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.3px}

/* Body below card */
.hero-body{padding:16px 20px 20px}

/* Priority cards */
.hero-priorities{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.hero-pri{display:flex;align-items:center;gap:12px;background:var(--sf);border-radius:var(--rm);padding:14px 14px 14px 0;border:1px solid var(--bdr-l);box-shadow:var(--s1);cursor:pointer;transition:transform .15s,box-shadow .15s;position:relative;overflow:hidden}
.hero-pri:active{transform:scale(.98);box-shadow:var(--s2)}
.hero-pri-bar{width:4px;align-self:stretch;border-radius:0 0 0 0;flex-shrink:0;margin-left:-1px;border-radius:12px 0 0 12px}
.hero-pri-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hero-pri-body{flex:1;min-width:0}
.hero-pri-label{font-size:14px;font-weight:700;letter-spacing:-.1px}
.hero-pri-sub{font-size:11.5px;color:var(--t2);margin-top:2px;line-height:1.4}
.hero-pri-val{font-size:10px;font-weight:700;padding:3px 9px;border-radius:100px;flex-shrink:0;white-space:nowrap}
.hero-pri-chev{color:var(--t3);font-size:16px;flex-shrink:0;opacity:.3}

/* Healthy bar */
.hero-healthy{display:flex;align-items:center;gap:10px;background:var(--ok-bg);border-radius:var(--rm);padding:12px 14px;border:1px solid #C8E6C9;cursor:pointer;transition:transform .15s;margin-bottom:4px}
.hero-healthy:active{transform:scale(.98)}
.hero-healthy-icon{width:22px;height:22px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.hero-healthy-txt{flex:1;font-size:13px;font-weight:600;color:var(--ok)}
.hero-healthy-chev{color:var(--ok);font-size:16px;opacity:.4}

/* Summary grid (4 boxes) */
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.hero-grid-box{background:var(--sf);border-radius:var(--rm);padding:16px;border:1px solid var(--bdr-l);cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:var(--s1);display:flex;flex-direction:column;min-height:110px}
.hero-grid-box:active{transform:scale(.98);box-shadow:var(--s2)}
.hero-grid-icon{width:28px;height:28px;margin-bottom:8px;color:var(--t2)}
.hero-grid-label{font-size:13.5px;font-weight:700;letter-spacing:-.1px;color:var(--t1);margin-bottom:4px}
.hero-grid-val{font-size:12px;color:var(--t2);font-weight:500;line-height:1.4}
.hero-grid-bar{height:5px;border-radius:3px;background:var(--bdr-l);margin-top:8px;overflow:hidden}
.hero-grid-bar-fill{height:100%;border-radius:3px}
.hero-grid-link{font-size:11.5px;font-weight:600;color:var(--brand);margin-top:auto;padding-top:8px}
.hero-grid-pill{display:inline-block;font-size:10.5px;font-weight:600;padding:4px 10px;border-radius:100px;margin-top:8px;background:var(--brand-l);color:var(--brand)}
.hero-grid-ring{position:relative;width:44px;height:44px;flex-shrink:0;float:right;margin:-4px -2px 0 6px}
.hero-grid-ring svg{width:44px;height:44px;transform:rotate(-90deg)}
.hero-grid-ring-bg{fill:none;stroke:var(--bdr-l);stroke-width:4}
.hero-grid-ring-fill{fill:none;stroke-width:4;stroke-linecap:round}
.hero-grid-ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:800;line-height:1}
.hero-grid-ring-of{font-size:7px;color:var(--t3);font-weight:600;text-transform:uppercase}

/* Health Scores section */
.hs{background:var(--sf);border-radius:var(--r);margin-bottom:12px;border:1px solid var(--bdr-l);box-shadow:var(--s1);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s;position:relative}
.hs:active{transform:scale(.985)}
.hs-compact{padding:16px 18px}
.hs-top{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.hs-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hs-name{font-size:var(--fs-md);font-weight:700;letter-spacing:-.1px;flex:1}
.hs-chev{color:var(--t3);font-size:14px;opacity:.3;transition:transform .25s;flex-shrink:0}
.hs.open .hs-chev{transform:rotate(180deg);opacity:.6}
.hs-sev{font-size:var(--fs-sm);font-weight:600;margin-bottom:10px}
.hs-gradient{height:8px;border-radius:4px;position:relative;margin-bottom:6px;overflow:visible}
.hs-gradient-bar{height:100%;border-radius:4px;background:linear-gradient(to right,var(--ok) 0%,var(--ok) 25%,var(--caut) 45%,var(--warn) 65%,var(--crit) 100%)}
.hs-gradient-dot{position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;background:#1B4332;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.25);transform:translateX(-50%);z-index:1}
.hs-gradient-labels{display:flex;justify-content:space-between;font-size:var(--fs-xs);color:var(--t3);font-weight:600}
.hs-vals{display:flex;justify-content:space-between;font-size:var(--fs-sm);font-weight:600;margin-top:8px}
.hs-val-ideal{color:var(--ok)}
.hs-val-actual{font-weight:700}
.hs-expand{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s ease}
.hs.open .hs-expand{max-height:1200px;opacity:1}
.hs-inner{padding:0 18px 18px}

/* Date/kit line */
.hero-date{font-size:11px;color:var(--t3);text-align:center;padding:10px 20px 6px}

/* ======== Section header ======== */
.sec{padding:8px 20px 24px}
.sec-hdr{display:flex;align-items:center;gap:12px;margin:28px 0 18px}
.sec-hdr::before,.sec-hdr::after{content:'';flex:1;height:1px;background:var(--bdr-l)}
.sec-lbl{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--t3);white-space:nowrap}

/* Finding card */
.fc{background:var(--sf);border-radius:var(--r);margin-bottom:12px;border:1px solid var(--bdr-l);box-shadow:var(--s1);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .15s;position:relative}
.fc:active{transform:scale(.985)}
.fc:hover{box-shadow:var(--s2)}
.fc-accent{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.fc-compact{display:flex;align-items:center;gap:14px;padding:16px 16px 16px 20px}
.fc-num{width:28px;height:28px;border-radius:50%;font-size:12px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fc-body{flex:1;min-width:0}
.fc-title{font-size:15.5px;font-weight:700;letter-spacing:-.1px}
.fc-sub{font-size:12.5px;color:var(--t2);margin-top:2px;line-height:1.45}
.fc-chev{width:30px;height:30px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .25s ease,background .2s,color .2s;color:var(--t3)}
.fc.open .fc-chev{transform:rotate(180deg);background:var(--brand-l);color:var(--brand)}

/* Expand animation */
.fc-expand{max-height:0;overflow:hidden;opacity:0;transition:max-height .4s cubic-bezier(.4,0,.2,1),opacity .3s ease}
.fc.open .fc-expand{max-height:1200px;opacity:1}
.fc-inner{padding:4px 20px 20px}
.fc-plain{font-size:13.5px;line-height:1.75;color:var(--t2);margin-bottom:16px}
.fc-reported{background:var(--brand-l);border-radius:var(--rs);padding:12px 14px;font-size:12.5px;line-height:1.55;color:var(--t2);margin-bottom:16px}
.fc-reported strong{color:var(--brand);font-weight:700}

/* Lab bar */
.lab-wrap{margin-bottom:16px}
.lab-hdr{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:8px}
.lab-ideal{color:var(--t3);font-weight:600}
.lab-actual{font-weight:700}
.lab-track{height:8px;background:var(--bdr-l);border-radius:4px;position:relative;margin-bottom:8px}
.lab-zone{position:absolute;left:30%;right:30%;top:0;bottom:0;background:rgba(46,125,50,.1);border-radius:4px}
.lab-dot{position:absolute;top:-4px;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.2);transform:translateX(-50%)}
.lab-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);font-weight:600}

/* Tags */
.fc-tags{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
.fc-tag{font-size:10.5px;font-weight:600;padding:3px 10px;border-radius:100px}

/* What to do */
.fc-wtd{background:var(--bg);border-radius:var(--rs);padding:14px 16px;margin-top:14px}
.fc-wtd-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--act);margin-bottom:8px}
.fc-wtd li{font-size:12.5px;color:var(--t2);padding:4px 0 4px 20px;position:relative;line-height:1.55;list-style:none}
.fc-wtd li::before{content:'\2713';position:absolute;left:0;color:var(--act);font-weight:700;font-size:11px}

/* Deep detail */
.fc-deep{border-top:1px solid var(--bdr-l);padding-top:14px;margin-top:14px}
.fc-dl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:6px;margin-top:12px}
.fc-dl:first-child{margin-top:0}
.fc-dlist{list-style:none;padding:0}
.fc-dlist li{font-size:12.5px;color:var(--t2);padding:3px 0 3px 14px;position:relative;line-height:1.5}
.fc-dlist li::before{content:'\2022';position:absolute;left:0;color:var(--t3)}

/* Good news — green banner header */
.gn{background:var(--sf);border-radius:var(--r);margin-bottom:12px;border:1px solid #C8E6C9;overflow:hidden;box-shadow:var(--s1)}
.gn-banner{background:linear-gradient(135deg,#2E7D32 0%,#43A047 100%);padding:16px 18px;color:#fff}
.gn-banner-title{font-size:16px;font-weight:800;letter-spacing:-.2px}
.gn-banner-sub{font-size:12px;opacity:.8;margin-top:2px}
.gn-list{padding:14px 18px}
.gn-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr-l)}
.gn-item:last-child{border-bottom:none;padding-bottom:0}
.gn-dot{width:22px;height:22px;border-radius:50%;background:var(--ok-l);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;margin-top:1px}
.gn-name{font-size:13.5px;font-weight:600}
.gn-desc{font-size:12px;color:var(--t2);line-height:1.45;margin-top:1px}

/* Body systems — expandable tiles */
.sys-hdr{font-size:13px;font-weight:700;color:var(--t1);margin-bottom:10px}
.sys-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.sys-tile{background:var(--sf);border-radius:var(--rm);border:1px solid var(--bdr-l);overflow:hidden;transition:box-shadow .2s}
.sys-tile:hover{box-shadow:var(--s2)}
.sys-tile-top{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;transition:background .15s}
.sys-tile-top:active{background:var(--bg)}
.sys-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;color:currentColor}
.sys-name{flex:1;font-size:13px;font-weight:600}
.sys-pill{font-size:9.5px;font-weight:700;padding:3px 9px;border-radius:100px;white-space:nowrap}
.sys-tile-chev{color:var(--t3);font-size:14px;opacity:.3;transition:transform .25s;flex-shrink:0}
.sys-tile.open .sys-tile-chev{transform:rotate(180deg);opacity:.6}
.sys-tile-detail{max-height:0;overflow:hidden;opacity:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease}
.sys-tile.open .sys-tile-detail{max-height:800px;opacity:1}
.sys-tile-inner{padding:0 14px 14px;font-size:12.5px;color:var(--t2);line-height:1.6;border-top:1px solid var(--bdr-l);margin-top:0;padding-top:12px}
.sys-tile-ratios{font-size:11px;color:var(--t3);margin-top:6px;font-weight:600}

/* Toxin */
.tox{background:var(--crit-bg);border:1px solid #FFCDD2;border-radius:var(--r);padding:18px;margin-bottom:12px;cursor:pointer;transition:box-shadow .2s,transform .15s;box-shadow:var(--s1)}
.tox:active{transform:scale(.985)}
.tox-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tox-title{font-size:14.5px;font-weight:700;color:var(--crit)}
.tox-badge{font-size:10px;font-weight:700;background:var(--crit);color:#fff;padding:3px 9px;border-radius:100px}
.tox-sum{font-size:13px;color:var(--t2);line-height:1.6}
.tox-hint{font-size:11px;color:var(--t3);margin-top:6px;font-weight:600;transition:opacity .2s}
.tox-expand{max-height:0;overflow:hidden;opacity:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease}
.tox.open .tox-expand{max-height:3000px;opacity:1}
.tox.open .tox-hint{opacity:0;max-height:0;margin:0;overflow:hidden}
.tox-inner{padding-top:14px}
.tox-row{display:flex;align-items:center;gap:10px;padding:6px 0}
.tox-lbl{font-size:12px;font-weight:600;color:var(--t2);width:72px;flex-shrink:0}
.tox-bar{flex:1;height:7px;border-radius:4px;background:#FFCDD2;overflow:hidden}
.tox-fill{height:100%;border-radius:4px;transition:width .5s ease}
.tox-val{font-size:10px;font-weight:700;padding:2px 8px;border-radius:100px;text-align:center;flex-shrink:0;white-space:nowrap}

/* Toxin row expand (per-element education) */
.tox-row-wrap{cursor:pointer;transition:background .15s;border-radius:var(--rs);margin:0 -6px;padding:0 6px}
.tox-row-wrap:active{background:rgba(0,0,0,.03)}
.tox-row-edu{max-height:0;overflow:hidden;opacity:0;transition:max-height .35s cubic-bezier(.4,0,.2,1),opacity .25s ease}
.tox-row-wrap.open .tox-row-edu{max-height:300px;opacity:1}
.tox-edu-inner{padding:8px 0 12px;border-bottom:1px solid var(--bdr-l)}
.tox-edu-what{font-size:12px;color:var(--t2);line-height:1.55;margin-bottom:8px}
.tox-edu-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:4px;margin-top:8px}
.tox-edu-list{list-style:none;padding:0}
.tox-edu-list li{font-size:12px;color:var(--t2);padding:2px 0 2px 14px;position:relative;line-height:1.5}
.tox-edu-list li::before{content:'\2022';position:absolute;left:0;color:var(--t3)}
.tox-row-more{font-size:11px;font-weight:600;color:var(--crit);padding:4px 0;cursor:pointer;display:flex;align-items:center;gap:4px}
.tox-row-wrap.open .tox-row-more .tox-more-chev{transform:rotate(180deg)}

// UTILITIES
function getSev(k) {
  var r = RATIOS[k], d = Math.abs(r.val - r.mean) / r.mean;
  if (d < 0.25) return {lv:"grn",c:"var(--ok)",bg:"var(--ok-l)"};
  if (d < 0.5)  return {lv:"ylw",c:"var(--caut)",bg:"var(--caut-l)"};
  if (d < 1.5)  return {lv:"org",c:"var(--warn)",bg:"var(--warn-l)"};
  return {lv:"red",c:"var(--crit)",bg:"var(--crit-l)"};
}
function getPos(k) {
  var r = RATIOS[k], ratio = r.val / r.mean;
  if (ratio <= 1) return 5 + ratio * 45;
  return 50 + Math.min((ratio - 1) / 4, 1) * 45;
}

var KEYS = ["CaK","NaK","NaMg","CaMg","CaP","ZnCu","FeCu"];
var PRI = KEYS.filter(function(k) { var s = getSev(k); return s.lv === "red" || s.lv === "org"; });
var THR = KEYS.filter(function(k) { return getSev(k).lv === "grn"; });

}

function buildFindings() {
  var cards = PRI.map(function(k, idx) {
    var r = RATIOS[k], s = getSev(k), pos = getPos(k);
    var deviation = r.val / r.mean;
    var sevLabel, sevColor;
    if (s.lv === 'org') { sevLabel = 'Concern \u00b7 ' + deviation.toFixed(1) + '\u00d7 ' + (r.val > r.mean ? 'above' : 'below') + ' optimal'; sevColor = 'var(--warn)'; }
    else { sevLabel = 'Priority \u00b7 ' + deviation.toFixed(1) + '\u00d7 ' + (r.val > r.mean ? 'above' : 'below') + ' optimal'; sevColor = 'var(--crit)'; }

    var innerHtml = '';
    if (r.plain) {
      innerHtml += '<div class="fc-plain">' + r.plain + '</div>';
    }
    if (r.reported) {
      innerHtml += '<div class="fc-reported"><strong>What you told us: </strong>' + r.reported.join(", ") + '</div>';
    }
    innerHtml += '<div style="margin-bottom:16px">' +
      '<div class="hs-gradient">' +
        '<div class="hs-gradient-bar"></div>' +
        '<div class="hs-gradient-dot" style="left:' + pos + '%"></div>' +
      '</div>' +
      '<div class="hs-gradient-labels"><span>Optimal</span><span>Watch</span><span>Concern</span><span>Priority</span></div>' +
      '<div class="hs-vals"><span class="hs-val-ideal">Ideal: ' + r.mean + '</span><span class="hs-val-actual" style="color:' + s.c + '">Oscar: ' + r.val + '</span></div>' +
    '</div>';
    if (r.systems) {
      innerHtml += '<div class="fc-tags">' + r.systems.map(function(sys) {
        return '<span class="fc-tag" style="background:' + s.bg + ';color:' + s.c + '">' + sys + '</span>';
      }).join('') + '</div>';
    }
    if (r.actions) {
      innerHtml += '<div class="fc-wtd"><div class="fc-wtd-hdr">What to do</div><ul>' +
        r.actions.map(function(a) { return '<li>' + a + '</li>'; }).join('') + '</ul></div>';
    }
    if (r.signs || r.factors) {
      innerHtml += '<div class="fc-deep">';
      if (r.signs) {
        innerHtml += '<div class="fc-dl">Signs to watch</div><ul class="fc-dlist">' +
          r.signs.map(function(si) { return '<li>' + si + '</li>'; }).join('') + '</ul>';
      }
      if (r.factors) {
        innerHtml += '<div class="fc-dl">Contributing factors</div><ul class="fc-dlist">' +
          r.factors.map(function(f) { return '<li>' + f + '</li>'; }).join('') + '</ul>';
      }
      innerHtml += '</div>';
    }

    return '<div class="fc" data-toggle="fc" id="finding-' + k + '">' +
      '<div class="fc-accent" style="background:' + s.c + '"></div>' +
      '<div class="fc-compact">' +
        '<div class="fc-num" style="background:' + s.bg + ';color:' + s.c + '">' + (idx + 1) + '</div>' +
        '<div class="fc-body">' +
          '<div class="fc-title">' + r.label + '</div>' +

        '<div class="fc-chev">' + SVG_ICONS.chevronDown + '</div>' +
      '</div>' +
      '<div class="fc-expand"><div class="fc-inner">' + innerHtml + '</div></div>' +

  }).join('');

  return cards;
}

        '<div class="sys-name">' + sys.name + '</div>' +
        '<span class="sys-pill" style="background:' + sv.bg + ';color:' + sv.c + '">' + sv.l + '</span>' +
        '<div class="sys-tile-chev">\u25BE</div>' +
      '</div>' +
      '<div class="sys-tile-detail"><div class="sys-tile-inner">' +
        sys.detail +
        '<div class="sys-tile-ratios">Related ratios: ' + sys.ratios + '</div>' +
        deepHtml +
      '</div></div></div>';
  }).join('');

  // Build summary rows for "looking good" (compact, non-expandable)
  var lookingGoodHtml = '';
  if (lookingGood.length > 0) {
    var goodRows = lookingGood.map(function(sys) {
      var sv = SEV_MAP[sys.sev];
      return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bdr-l)">' +
        '<div class="sys-icon" style="background:' + sv.bg + ';color:' + sv.c + ';flex-shrink:0">' + sys.icon + '</div>' +
        '<div style="flex:1">' +
          '<div style="font-size:var(--fs-base);font-weight:600;color:var(--t1)">' + sys.name + '</div>' +
        '</div>' +
        '<span class="sys-pill" style="background:' + sv.bg + ';color:' + sv.c + ';white-space:nowrap">' + sv.l + '</span>' +
      '</div>';
    }).join('');
    lookingGoodHtml = '<div style="margin-top:20px">' +
      '<div class="sec-lbl" style="margin-bottom:12px">LOOKING GOOD</div>' +
      '<div style="background:var(--sf);border-radius:var(--rm);border:1px solid var(--bdr-l);padding:12px 16px">' +
      goodRows +
      '</div></div>';
  }

  var html = '<div style="margin-top:20px">' +
    '<div class="sec-lbl" style="margin-bottom:12px">NEEDS ATTENTION</div>' +
    '<div class="sys-grid">' + needsAttentionTiles + '</div>' +
    lookingGoodHtml +
    '</div>';
  return html;
}

function buildToxin() {
  var bars = TOXICS.map(function(t) {
    var hi = t.val > t.max;
    var pct = Math.min((t.val / (t.max * 2)) * 100, 100);
    var ratio = t.val / t.max;
    var valText, valColor, valBg;
    if (hi) {
      valText = 'Eliminate \u00b7 ' + t.val;
      valColor = 'var(--crit)';
      valBg = 'var(--crit-l)';
    } else if (ratio > 0.6) {
      valText = 'Reduce';
      valColor = 'var(--warn)';
      valBg = 'var(--warn-l)';
    } else {
      valText = 'Monitor';
      valColor = 'var(--caut)';
      valBg = 'var(--caut-l)';
    }
    // Per-element education expandable
    var eduHtml = '';
    if (t.what) {
      var srcList = t.sources ? '<div class="tox-edu-label">Common sources</div><ul class="tox-edu-list">' +
        t.sources.map(function(s) { return '<li>' + s + '</li>'; }).join('') + '</ul>' : '';
      var redList = t.reduce ? '<div class="tox-edu-label">How to ' + (hi ? 'eliminate' : ratio > 0.6 ? 'reduce' : 'maintain') + '</div><ul class="tox-edu-list">' +
        t.reduce.map(function(r) { return '<li>' + r + '</li>'; }).join('') + '</ul>' : '';
      eduHtml = '<div class="tox-row-edu"><div class="tox-edu-inner">' +
        '<div class="tox-edu-what">' + t.what + '</div>' +
        srcList + redList + '</div></div>';
    }
    return '<div class="tox-row-wrap" data-toggle="tox-edu">' +
      '<div class="tox-row"><div class="tox-lbl">' + t.label + '</div>' +
      '<div class="tox-bar"><div class="tox-fill" style="width:' + (hi ? 100 : pct) + '%;background:' + (hi ? 'var(--crit)' : ratio > 0.6 ? 'var(--warn)' : 'var(--caut)') + '"></div></div>' +
      '<div class="tox-val" style="color:' + valColor + ';background:' + valBg + '">' + valText + '</div></div>' +
      '<div class="tox-row-more"><span>Learn more</span><span class="tox-more-chev">\u25BE</span></div>' +
      eduHtml + '</div>';
  }).join('');

  return '<div class="tox" data-toggle="tox">' +
    '<div class="tox-top"><div class="tox-title" style="display:flex;align-items:center;gap:8px"><span style="width:18px;height:18px;flex-shrink:0">' + SVG_ICONS.warning + '</span>Aluminum Elevated</div><div class="tox-badge">87\u00d7 above ref</div></div>' +
    '<div class="tox-sum">Oscar\u2019s aluminum level is significantly elevated. All 6 other metals tested are below reference limits.</div>' +
    '<div class="tox-hint">Tap for details \u25BE</div>' +
    '<div class="tox-expand"><div class="tox-inner">' + bars +
    '</div></div></div>';
}

function buildPlan() {
  var phasesHtml = PHASES.map(function(phase, pi) {
    var items = phase.items.map(function(item) {
      var isChecked = checkedItems[item.id];
      var extra = '';
      if (item.detail === "diet") {
        extra = '<div class="diet-card"><div class="diet-card-title">Mixed oxidizer diet</div>' +
          '<div class="diet-card-row"><strong>Best: </strong>Fish, chicken, turkey, eggs, organ meats</div>' +
          '<div class="diet-card-row"><strong>Healthy fats: </strong>Coconut oil, olive oil, fatty fish</div>' +
          '<div class="diet-card-row"><strong>Moderate: </strong>Sweet potato, leafy greens, berries</div>' +
          '<div class="diet-card-row"><strong>Avoid: </strong>Kibble, white rice, corn, grain flours</div></div>';
      }
      if (item.detail === "supp" && item.supp) {
        var sp = item.supp;
        extra = '<div class="supp-card"><div class="supp-card-icon">' + sp.icon + '</div>' +
          '<div style="flex:1;min-width:0"><div class="supp-card-name">' + sp.name + '</div><div class="supp-card-why">' + sp.why + '</div></div>' +
          '<div class="supp-card-price">' + sp.price + '</div></div>';
      }
      return '<div class="ci" data-check="' + item.id + '">' +
        '<div class="ci-box' + (isChecked ? ' on' : '') + '">\u2713</div>' +
        '<div class="ci-txt' + (isChecked ? ' done' : '') + '">' + item.text + '</div></div>' + extra;
    }).join('');

    var doneCount = phase.items.filter(function(it) { return checkedItems[it.id]; }).length;
    var pct = Math.round(doneCount / phase.items.length * 100);

    return '<div class="phase" data-phase="' + pi + '">' +
      '<div class="ph-hdr"><div class="ph-dot" style="background:' + phase.color + ';box-shadow:0 0 0 3px var(--sf)"></div>' +
        '<div><div class="ph-name">' + phase.name + '</div><div class="ph-when">' + phase.when + '</div></div></div>' +
      '<div class="ph-prog"><div class="ph-prog-bar"><div class="ph-prog-fill" style="width:' + pct + '%"></div></div>' +
        '<div class="ph-prog-pct">' + pct + '%</div></div>' +
      items + '</div>';
  }).join('');

  return '<div class="plan"><div class="plan-title">Oscar\u2019s Plan</div>' +
    '<div class="plan-desc">Everything in one place \u2014 diet, supplements, and lifestyle changes organized by when to start. Check off items as you go.</div>' +
    phasesHtml + '</div>';
}

// EVENT BINDING (event delegation)
function bindEvents() {
  document.addEventListener('click', function(e) {
    // Scroll-to (hero priority cards + healthy bar)
    var scrollEl = e.target.closest('[data-scroll]');
    if (scrollEl) {
      var id = scrollEl.getAttribute('data-scroll');
      var el = document.getElementById(id);
      if (el) {
        var offset = 80;
        var y = el.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({top: y, behavior: 'smooth'});
      }
      return;
    }

    // Health score card expand/collapse
    var hs = e.target.closest('[data-toggle="hs"]');
    if (hs && !e.target.closest('.hs-inner')) {
      hs.classList.toggle('open');
      return;
    }

    // Finding card expand/collapse
    var fc = e.target.closest('[data-toggle="fc"]');
    if (fc && !e.target.closest('.fc-inner')) {
      fc.classList.toggle('open');
      return;
    }

    // Body system tile expand/collapse
    var sysTile = e.target.closest('[data-toggle="sys-tile"]');
    if (sysTile && !e.target.closest('.sys-tile-inner')) {
      sysTile.classList.toggle('open');
      return;
    }

    // Toxin per-element education expand
    var toxEdu = e.target.closest('[data-toggle="tox-edu"]');
    if (toxEdu && !e.target.closest('.tox-edu-inner')) {
      toxEdu.classList.toggle('open');
      e.stopPropagation();
      return;
    }

    // Toxin card expand
    var tox = e.target.closest('[data-toggle="tox"]');
    if (tox && !e.target.closest('.tox-inner')) {
      tox.classList.toggle('open');
      return;
    }

    // Body system "More Details..." deep expand
    var sysDeep = e.target.closest('[data-toggle="sys-deep"]');
    if (sysDeep) {
      var tile = sysDeep.closest('.sys-tile');
      if (tile) tile.classList.toggle('deep');
      e.stopPropagation();
      return;
    }

    // Checkboxes
    var ci = e.target.closest('[data-check]');
    if (ci) {
      var cid = ci.getAttribute('data-check');
      checkedItems[cid] = !checkedItems[cid];
      var box = ci.querySelector('.ci-box');
      var txt = ci.querySelector('.ci-txt');
      if (box) box.classList.toggle('on', checkedItems[cid]);
      if (txt) txt.classList.toggle('done', checkedItems[cid]);
      updatePhaseProgress();
      return;
    }
  });
}

function updatePhaseProgress() {
  PHASES.forEach(function(phase, pi) {
    var doneCount = phase.items.filter(function(it) { return checkedItems[it.id]; }).length;
    var pct = Math.round(doneCount / phase.items.length * 100);
    var phaseEl = document.querySelector('[data-phase="' + pi + '"]');
    if (phaseEl) {
      var fill = phaseEl.querySelector('.ph-prog-fill');
      var label = phaseEl.querySelector('.ph-prog-pct');
      if (fill) fill.style.width = pct + '%';
      if (label) label.textContent = pct + '%';
    }
  });
}

// INIT
render();
</script>
